<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Products</title>
    <link rel="stylesheet" href="../css/style.css">
    <style>
        .highlight-category {
            background-color: #3d2f0f;
            color: #d4af37;
        }
    </style>
</head>

<body>

<header class="navbar">
    <div id="logo">
        <img src="../img/noir.jpg" alt="G&Y Sole Logo" class="logo">
    </div>
    <nav>
        <a href="../index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="account.html">Account</a>
    </nav>
</header>

<main class="container">
    <h1 style="text-align:center;">Products Table</h1>

    <section class="content-block">
        <h2>Catalogue dynamique </h2>
        <table id="dynamicProductsTable">
            <thead>
                <tr>
                    <th>Collection</th>
                    <th>Marque</th>
                    <th>Modèle</th>
                    <th>Type</th>
                </tr>
            </thead>
            <tbody id="productsBody"></tbody>
        </table>
    </section>

    <section class="content-block">
        <h2>Ajouter un produit</h2>
        <form id="formAddProduct" action="#" method="post">
            <div class="form-group">
                <label for="addCollection">Collection</label>
                <select id="addCollection" name="collection">
                    <option value="Men">Men</option>
                    <option value="Women">Women</option>
                    <option value="Kids">Kids</option>
                </select>
            </div>
            <div class="form-group">
                <label for="addBrand">Marque</label>
                <input type="text" id="addBrand" name="brand" placeholder="Ex. Nike">
            </div>
            <div class="form-group">
                <label for="addModel">Modèle</label>
                <input type="text" id="addModel" name="model" placeholder="Ex. Air Max">
            </div>
            <div class="form-group">
                <label for="addType">Type</label>
                <input type="text" id="addType" name="type" placeholder="Ex. Running">
            </div>
            <button type="submit">Ajouter au tableau</button>
        </form>
    </section>

    <section class="content-block">
        <h2>Rechercher dans le catalogue</h2>
        <form id="formSearchProduct" action="#" method="get">
            <div class="form-group">
                <label for="searchQuery">Recherche (marque, modèle, collection, type)</label>
                <input type="text" id="searchQuery" name="q" placeholder="Ex. Nike, Running...">
            </div>
            <button type="submit">Rechercher</button>
            <button type="button" id="btnResetSearch">Afficher tout</button>
        </form>
    </section>

    <section>
        <h2>Featured Products</h2>
        <div class="grid-container">
            <div class="grid-item">
                <img src="../img/nike.jpg" alt="Nike Air Max">
                <p>Nike Air Max</p>
            </div>
            <div class="grid-item">
                <img src="../img/adidas.jpg" alt="Adidas Ultraboost">
                <p>Adidas Ultraboost</p>
            </div>
            <div class="grid-item">
                <img src="../img/puma.jpg" alt="Puma Cali">
                <p>Puma Cali</p>
            </div>
            <div class="grid-item">
                <img src="../img/newbalance.jpg" alt="New Balance 574">
                <p>New Balance 574</p>
            </div>
            <div class="grid-item">
                <img src="../img/converse.jpg" alt="Converse All Star">
                <p>Converse All Star</p>
            </div>
        </div>
    </section>
</main>

<footer>
    <p>© 2026 G&Y Sole</p>
</footer>

<script src="../js/products.js"></script>
</body>
</html>
