<html lang="fr">

    <meta charset="UTF-8">

</head>

<body>

<header class="navbar">
    <div id="logo">
        <img src="../img/noir.jpg" alt="G&Y Sole Logo" class="logo">
    </div>
    <nav>
        <a href="../index.html">Home</a>
        <a href="products.html">Products</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
        <a href="account.html">Account</a>
    </nav>
</header>

<div class="contact-marquee-wrap">
    <marquee id="contactMarquee" behavior="scroll" direction="left" scrollamount="5" class="contact-marquee">
        <img src="../img/noir.jpg" alt="Logo" style="height:25px; vertical-align:middle; margin-right:10px;">
        <span id="contactMarqueeText">Chargement...</span>
    </marquee>
</div>

<main class="container">
    <h1>Contact Us</h1>

    <nav class="contact-page-nav content-block" aria-label="Pages complémentaires">
        <p class="contact-page-nav-title">Navigation :</p>
        <p>
            <a href="questionnaire.html">Questionnaire de satisfaction</a>
            <span class="contact-page-nav-sep"> | </span>
            <a href="funpage.html">Page fun</a>
        </p>
    </nav>

    <section class="content-block">
        <h2>Galerie</h2>
        <div class="contact-gallery">
            <img id="contactGalleryImg" src="../img/nike.jpg" alt="Galerie chaussures G&Y Sole">
        </div>
    </section>

    <p>If you have any questions, please fill in the form below or write to us at
        <a href="mailto:gysole@gmail.com">gysole@gmail.com</a>.
    </p>

    <!-- Envoi vers script PHP -->
    <form id="contactForm" action="../php/contact_traitement.php" method="post"
          novalidate onsubmit="return validerContact()">

        <div class="form-group">
            <label for="name">Name *</label>
            <input type="text" id="name" name="name" placeholder="Your name">
            <span id="errName" class="err-msg"></span>
        </div>

        <div class="form-group">
            <label for="email">Email *</label>
            <input type="email" id="email" name="email" placeholder="you@example.com"
                   pattern="[^\s@]+@[^\s@]+\.[^\s@]+">
            <span id="errEmail" class="err-msg"></span>
        </div>

        <div class="form-group">
            <label for="message">Message * (min 10 caractères)</label>
            <textarea id="message" name="message" rows="5"
                      placeholder="Write your message here..." minlength="10"></textarea>
            <span id="errMessage" class="err-msg"></span>
        </div>

        <input type="submit" value="Send">
    </form>
</main>

<footer>
    <p>© 2026 G&Y Sole</p>
</footer>

<style>
.err-msg {
    color: #f44336;
    font-size: 0.85em;
    display: block;
    min-height: 1.2em;
    margin-top: 4px;
}
</style>

<script src="../js/contact.js"></script>
<script>
/**
 * Validation JavaScript — Formulaire Contact
 * Membres : Yahia, Ghafer
 */
function validerContact() {
    var valide = true;

    function setErreur(id, msg) {
        var el = document.getElementById(id);
        if (el) el.innerText = msg;
        if (msg !== '') valide = false;
    }

    // Nom : obligatoire, min 2 car.
    var name = document.getElementById('name').value.trim();
    if (name === '') {
        setErreur('errName', 'Le nom est obligatoire.');
    } else if (name.length < 2) {
        setErreur('errName', 'Le nom doit contenir au moins 2 caractères.');
    } else {
        setErreur('errName', '');
    }

    // Email : regex
    var email = document.getElementById('email').value.trim();
    var regexEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!regexEmail.test(email)) {
        setErreur('errEmail', 'Adresse e-mail invalide.');
    } else {
        setErreur('errEmail', '');
    }

    // Message : min 10 car.
    var message = document.getElementById('message').value.trim();
    if (message.length < 10) {
        setErreur('errMessage', 'Le message doit contenir au moins 10 caractères (actuellement : ' + message.length + ').');
    } else {
        setErreur('errMessage', '');
    }

    return valide;
}
</script>
</body>
